<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Стояние — глобальная пауза</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Основной экран */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            transition: opacity 1s ease;
            opacity: 1;
            z-index: 10;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* Текстовая анимация */
        .message {
            font-size: 2rem;
            text-align: center;
            padding: 2rem;
            letter-spacing: 0.1rem;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 90%;
        }

        /* Таймер */
        .timer {
            font-size: 5rem;
            font-weight: bold;
            margin-top: 2rem;
            font-family: monospace;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
        }

        /* Карта */
        .map-container {
            position: relative;
            width: 90%;
            max-width: 1200px;
            height: 60%;
            background: #111;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid #333;
            margin-bottom: 2rem;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #0a0f1a;
        }

        .stats {
            font-size: 1.2rem;
            background: rgba(0,0,0,0.7);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            backdrop-filter: blur(5px);
        }

        .glow {
            text-shadow: 0 0 8px #00aaff;
        }

        button {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 0.8rem 2rem;
            font-size: 1.2rem;
            font-family: monospace;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s;
            border-radius: 3rem;
        }

        button:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .info {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.7rem;
            color: #555;
            z-index: 20;
        }

        @media (max-width: 600px) {
            .message { font-size: 1.2rem; }
            .timer { font-size: 3rem; }
            .stats { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div id="screen1" class="screen">
    <div class="message" id="typingMessage"></div>
</div>

<div id="screen2" class="screen hidden">
    <div class="timer" id="timerDisplay">30</div>
    <div class="message" style="font-size:1rem; margin-top:1rem;">Просто стой. Дыши.</div>
</div>

<div id="screen3" class="screen hidden">
    <div class="map-container">
        <canvas id="worldCanvas" width="800" height="400" style="width:100%; height:100%;"></canvas>
    </div>
    <div class="stats" id="statsText">Загрузка...</div>
    <button id="restartBtn">Стоять снова</button>
</div>

<div class="info">Стояние — глобальная пауза. Ты не один.</div>

<script>
    // Фраза для печати
    const fullText = "Ты не обязан бежать.\nТы можешь просто стоять.\nИ дышать.";
    let index = 0;
    const typingElement = document.getElementById('typingMessage');
    const screen1 = document.getElementById('screen1');
    const screen2 = document.getElementById('screen2');
    const screen3 = document.getElementById('screen3');
    const timerDisplay = document.getElementById('timerDisplay');
    let timerInterval;
    let countdown = 30;

    // --- Счетчик запусков (глобальный, анонимный) ---
    let globalCounter = 0;
    const STORAGE_KEY = 'standing_global_counter';
    // Для демонстрации будем хранить локально, но имитируем "общий" счетчик, добавляя +1 при первом запуске в этой сессии.
    // Чтобы сделать эффект "миллиона", можно добавить случайный оффсет или просто показывать накопленное число.
    // Сделаем так: при первом посещении добавляем 1 к сохраненному числу. При повторных заходах (обновлении страницы) не добавляем.
    // Но также можно добавить кнопку "Я тоже остановился", но по концепции сам запуск скрипта уже считается стоянием.
    // Однако, чтобы не накручивать при каждом обновлении, используем sessionStorage, чтобы за одну сессию добавлялось только один раз.
    // При первом запуске (или после перезагрузки, если сессия новая) увеличиваем счетчик.
    function initGlobalCounter() {
        let stored = localStorage.getItem(STORAGE_KEY);
        if (stored === null) {
            globalCounter = 12847; // стартовое число, чтобы не с нуля (символическое)
            localStorage.setItem(STORAGE_KEY, globalCounter);
        } else {
            globalCounter = parseInt(stored);
        }
        // Проверяем, добавляли ли мы уже в этой сессии
        const sessionFlag = sessionStorage.getItem('standing_counted');
        if (!sessionFlag) {
            // Увеличиваем счетчик на 1
            globalCounter++;
            localStorage.setItem(STORAGE_KEY, globalCounter);
            sessionStorage.setItem('standing_counted', 'true');
        } else {
            // уже добавляли
        }
        return globalCounter;
    }

    // --- Анимация печати ---
    function typeNext() {
        if (index < fullText.length) {
            typingElement.textContent += fullText.charAt(index);
            index++;
            setTimeout(typeNext, 100);
        } else {
            // Задержка перед переходом к таймеру
            setTimeout(() => {
                screen1.classList.add('hidden');
                screen2.classList.remove('hidden');
                startTimer();
            }, 1500);
        }
    }

    // --- Таймер 30 секунд ---
    function startTimer() {
        countdown = 30;
        timerDisplay.textContent = countdown;
        timerInterval = setInterval(() => {
            countdown--;
            timerDisplay.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timerInterval);
                // Переход к карте
                screen2.classList.add('hidden');
                screen3.classList.remove('hidden');
                drawWorldMap();
                updateStats();
            }
        }, 1000);
    }

    // --- Рисуем карту с анимированными точками (симуляция глобальной активности) ---
    let animationFrame;
    let points = [];
    const canvas = document.getElementById('worldCanvas');
    let ctx;

    function initPoints() {
        // Генерируем 150 случайных точек по всему миру (широта/долгота)
        points = [];
        for (let i = 0; i < 150; i++) {
            points.push({
                x: Math.random(), // долгота 0..1 (0..360)
                y: Math.random(), // широта 0..1 (-90..90)
                phase: Math.random() * Math.PI * 2,
                speed: 0.02 + Math.random() * 0.03,
                radius: 3 + Math.random() * 6
            });
        }
        // Добавим несколько "горячих" точек (мегаполисы)
        const hotSpots = [
            { lon: 37.6178, lat: 55.7558, radius: 8 },   // Москва
            { lon: -74.006, lat: 40.7128, radius: 8 },   // Нью-Йорк
            { lon: 139.6917, lat: 35.6895, radius: 8 },  // Токио
            { lon: -0.1278, lat: 51.5074, radius: 8 },   // Лондон
            { lon: 116.4074, lat: 39.9042, radius: 8 },  // Пекин
            { lon: 151.2073, lat: -33.8675, radius: 8 }, // Сидней
            { lon: -46.6333, lat: -23.5505, radius: 8 }, // Сан-Паулу
            { lon: 28.9784, lat: 41.0082, radius: 8 },   // Стамбул
        ];
        hotSpots.forEach(spot => {
            // Конвертируем lon (0..360) и lat (-90..90) в x,y
            let x = (spot.lon + 180) / 360;
            let y = 1 - (spot.lat + 90) / 180;
            points.push({
                x: x,
                y: y,
                phase: Math.random() * Math.PI * 2,
                speed: 0.04,
                radius: spot.radius,
                isHot: true
            });
        });
    }

    function drawWorldMap() {
        if (!canvas) return;
        ctx = canvas.getContext('2d');
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        canvas.width = w;
        canvas.height = h;

        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, w, h);
            // Рисуем континенты (упрощённо, для атмосферы)
            ctx.fillStyle = '#0f1a2f';
            ctx.fillRect(0, 0, w, h);
            ctx.strokeStyle = '#2a3f5e';
            ctx.lineWidth = 1;
            // Очень простая карта: несколько эллипсов для намёка
            ctx.beginPath();
            // Евразия
            ctx.moveTo(w*0.6, h*0.3);
            ctx.bezierCurveTo(w*0.7, h*0.2, w*0.9, h*0.3, w*0.85, h*0.5);
            ctx.lineTo(w*0.65, h*0.55);
            ctx.lineTo(w*0.55, h*0.45);
            ctx.fillStyle = '#1e2f45';
            ctx.fill();
            // Африка
            ctx.beginPath();
            ctx.moveTo(w*0.45, h*0.55);
            ctx.lineTo(w*0.55, h*0.65);
            ctx.lineTo(w*0.4, h*0.7);
            ctx.fill();
            // Америка
            ctx.beginPath();
            ctx.moveTo(w*0.25, h*0.4);
            ctx.lineTo(w*0.35, h*0.45);
            ctx.lineTo(w*0.3, h*0.6);
            ctx.lineTo(w*0.2, h*0.55);
            ctx.fill();
            // Австралия
            ctx.beginPath();
            ctx.ellipse(w*0.8, h*0.8, w*0.07, h*0.05, 0, 0, Math.PI*2);
            ctx.fill();

            // Рисуем точки с пульсацией
            const now = Date.now() / 1000;
            for (let p of points) {
                const cx = p.x * w;
                const cy = p.y * h;
                const pulse = 0.6 + 0.4 * Math.sin(now * p.speed * 5 + p.phase);
                const rad = p.radius * pulse * (w / 800);
                const grad = ctx.createRadialGradient(cx, cy, rad*0.2, cx, cy, rad);
                grad.addColorStop(0, 'rgba(255, 100, 100, 0.9)');
                grad.addColorStop(1, 'rgba(255, 50, 50, 0)');
                ctx.beginPath();
                ctx.arc(cx, cy, rad, 0, Math.PI*2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(cx, cy, rad*0.3, 0, Math.PI*2);
                ctx.fillStyle = '#ff6666';
                ctx.fill();
            }
            animationFrame = requestAnimationFrame(draw);
        }
        draw();
    }

    function updateStats() {
        const counter = initGlobalCounter(); // обновляет и возвращает
        const statsDiv = document.getElementById('statsText');
        statsDiv.innerHTML = `🌍 Глобальное стояние: ${counter.toLocaleString()} человек остановилось<br>⏳ Ты — один из них. Дыши.`;
    }

    // Перезапуск всей церемонии
    function restart() {
        // Останавливаем анимацию карты
        if (animationFrame) cancelAnimationFrame(animationFrame);
        // Сбрасываем всё
        clearInterval(timerInterval);
        index = 0;
        typingElement.textContent = '';
        screen3.classList.add('hidden');
        screen1.classList.remove('hidden');
        screen1.classList.remove('hidden');
        screen2.classList.add('hidden');
        // Сброс таймера и текста
        typeNext();
    }

    // Инициализация
    initGlobalCounter();
    initPoints();
    // Запускаем анимацию печати
    typeNext();

    // Кнопка перезапуска
    document.getElementById('restartBtn').addEventListener('click', () => {
        restart();
    });

    // При изменении размера окна перерисовываем canvas
    window.addEventListener('resize', () => {
        if (!screen3.classList.contains('hidden') && ctx) {
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;
            canvas.width = w;
            canvas.height = h;
            drawWorldMap();
        }
    });
</script>
</body>
</html>
